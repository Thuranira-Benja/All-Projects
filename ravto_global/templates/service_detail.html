{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ service.title }} - RAVTO GLOBAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">{{ service.title }}</h2>
            </div>
            <div class="card-body">
                {% if service.image %}
                <img src="{{ service.image.url }}" class="img-fluid rounded mb-4" alt="{{ service.title }}">
                {% endif %}
                <div class="service-content">
                    {{ service.description|linebreaks }}
                </div>
                <div class="text-center mt-4">
                    <a href="{% url 'home' %}" class="btn-custom-success">Return Home</a>
                    <a href="{% url 'services' %}" class="btn-custom-primary ms-3">View All Services</a>
                </div>
            </div>
        </div>
    </div>

    <style>
        .btn-custom-primary {
            display: inline-block;
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-custom-primary:hover {
            background: linear-gradient(45deg, #0056b3, #003f7f);
            transform: translateY(-3px);
        }

        .btn-custom-success {
            display: inline-block;
            background: linear-gradient(45deg, #28a745, #1e7e34);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-custom-success:hover {
            background: linear-gradient(45deg, #1e7e34, #145c2b);
            transform: translateY(-3px);
        }
        
        .service-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
