{% extends 'base.html' %}

{% block content %}
<div class="p-5 mb-4 bg-white rounded-3 shadow-sm text-center">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold">Dnego Hardware Wholesale</h1>
        <p class="fs-4">“Building the Future”</p>
    </div>
</div>

<!-- Product Categories -->
<div class="my-5">
    <h2 class="text-center fw-bold mb-4">Our Product Categories</h2>
    <div class="row g-4">
        {% for category in categories %}
        <div class="col-md-6 col-lg-3">
            <a href="{% url 'store:product_list' %}#{{ category.slug }}" class="text-decoration-none">
                <div class="card h-100 shadow-sm text-center">
                    <div class="card-body d-flex align-items-center justify-content-center">
                        <h5 class="card-title fw-semibold">{{ category.name }}</h5>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>

<!-- Google Maps Embed -->
<div class="card shadow-sm">
    <div class="card-header">
        <h2 class="text-center fw-bold my-2">Our Location in Meru, Kenya</h2>
    </div>
    <div class="card-body p-0">
        <div class="w-100" style="height: 450px;">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d63839.03533230863!2d37.61108269096525!3d0.05204481308216186!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1788261399386345%3A0x25a3f37b2521c7ba!2sMeru!5e0!3m2!1sen!2ske!4v1670000000000!5m2!1sen!2ske" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>
</div>
{% endblock %}
